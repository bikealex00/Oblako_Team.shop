<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OblakoTeam Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">OBLAKO<span>TEAM</span></div>
        <button onclick="toggleCart()" class="btn-add">
            Корзина (<span id="cart-count">0</span>)
        </button>
    </nav>

    <header style="text-align: center; padding: 100px 20px;">
        <h1 style="font-size: 4rem;">OblakoTeam Merch</h1>
        <p>Лучший шмот для лучших разработчиков.</p>
    </header>

    <div class="grid" id="products-grid"></div>

    <div id="cart-sidebar">
        <h2>Корзина</h2>
        <div id="cart-items-list"></div>
        <hr>
        <h3>Итого: <span id="cart-total-price">0 ₽</span></h3>
        <button onclick="toggleCart()" class="btn-add" style="width:100%; margin-top:20px;">Закрыть</button>
        <button class="btn-add" style="width:100%; margin-top:10px; background:#22c55e;">Оплатить</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
