<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OblakoTeam Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="clouds-container">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>

    <header>
        <div class="logo">OblakoTeam <span>Store</span></div>
        <nav>
            <a href="#catalog">Каталог</a>
        </nav>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 Кошик (<span id="cart-count">0</span>)
        </div>
    </header>

    <section class="hero">
        <h1>Преміум кальяни та аксесуари</h1>
        <p>Кращий дим для вашої атмосфери</p>
        <a href="#catalog" class="btn">До каталогу</a>
    </section>

    <main id="catalog">
        <h2 class="section-title">Наш асортимент</h2>
        <div class="products-grid">
            <div class="product-card">
                <div class="product-img">💨</div>
                <h3>Кальян Alpha Hookah</h3>
                <p class="price">12000 <span>₴</span></p>
                <button class="btn-buy" onclick="addToCart('Кальян Alpha Hookah', 12000)">У кошик</button>
            </div>
            <div class="product-card">
                <div class="product-img">🥣</div>
                <h3>Чаша Облако (Phunnel)</h3>
                <p class="price">1500 <span>₴</span></p>
                <button class="btn-buy" onclick="addToCart('Чаша Облако (Phunnel)', 1500)">У кошик</button>
            </div>
        </div>
    </main>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <span class="close-cart" onclick="toggleCart()">&times;</span>
            <h2>Ваш кошик</h2>
            <div id="cart-items-list">
                <p class="empty-text">Кошик поки що порожній</p>
            </div>
            <div class="cart-summary">
                <span>Всього:</span>
                <span id="cart-total-price">0 ₴</span>
            </div>
            <button class="btn btn-order" onclick="sendToTelegram()">Оформити в Telegram</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
