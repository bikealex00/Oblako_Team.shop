<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OblakoTeam | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .cart-open { overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50">

    <div id="cartOverlay" class="fixed inset-0 bg-black/40 z-[100] hidden opacity-0 transition-opacity duration-300"></div>
    <div id="cartSidebar" class="fixed right-0 top-0 h-full w-full max-w-md bg-white z-[101] translate-x-full transition-transform duration-300 shadow-2xl p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-extrabold">Ваша корзина</h2>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-black text-2xl">&times;</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto space-y-4">
            <p class="text-gray-400 text-center py-10">Корзина пока пуста</p>
        </div>
        <div class="border-t pt-6 mt-6">
            <div class="flex justify-between text-xl font-bold mb-6">
                <span>Итого:</span>
                <span id="cartTotal">0 ₽</span>
            </div>
            <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all active:scale-95">
                Оформить заказ
            </button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter text-blue-600">OBLAKO<span class="text-slate-900">TEAM</span></div>
            
            <div class="flex items-center gap-6">
                <button onclick="toggleCart()" class="relative p-3 bg-white border border-gray-200 rounded-xl hover:shadow-md transition">
                    <span>🛒</span>
                    <span id="cartBadge" class="absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="pt-16 pb-24 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <span class="bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-sm font-bold tracking-wide uppercase">New Collection 2026</span>
            <h1 class="text-6xl md:text-8xl font-black mt-8 mb-6 tracking-tight text-slate-900">Выбирай <span class="text-blue-600">свой</span> облачный стиль.</h1>
            <p class="text-lg text-slate-500 mb-10">Лимитированная серия мерча для тех, кто создает будущее вместе с OblakoTeam.</p>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 pb-32">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="productGrid">
            </div>
    </section>

    <script>
        // ДАННЫЕ О ТОВАРАХ
        const products = [
            { id: 1, name: 'Худи "Cloud Master"', price: 5400, category: 'Одежда', img: '☁️' },
            { id: 2, name: 'Футболка "System Root"', price: 2800, category: 'Одежда', img: '👕' },
            { id: 3, name: 'Кепка Oblako Tech', price: 1900, category: 'Аксессуары', img: '🧢' },
            { id: 4, name: 'Рюкзак Developer Pro', price: 7200, category: 'Снаряжение', img: '🎒' },
            { id: 5, name: 'Термос Stainless Cloud', price: 2100, category: 'Аксессуары', img: '☕' },
            { id: 6, name: 'Носки "Happy Coder"', price: 800, category: 'Мерч', img: '🧦' }
        ];

        let cart = JSON.parse(localStorage.getItem('oblakocart')) || [];

        // РЕНДЕР ТОВАРОВ
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="group bg-white border border-gray-100 p-2 rounded-[32px] hover:shadow-2xl hover:shadow-blue-100 transition-all duration-500">
                    <div class="aspect-square bg-slate-100 rounded-[24px] flex items-center justify-center text-6xl group-hover:scale-105 transition-transform duration-500">
                        ${p.img}
                    </div>
                    <div class="p-6">
                        <p class="text-xs font-bold text-blue-500 uppercase tracking-widest">${p.category}</p>
                        <h3 class="text-xl font-bold mt-1">${p.name}</h3>
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-2xl font-black">${p.price} ₽</span>
                            <button onclick="addToCart(${p.id})" class="bg-slate-900 text-white p-4 rounded-2xl hover:bg-blue-600 transition-colors">
                                Добавить +
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ЛОГИКА КОРЗИНЫ
        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            sidebar.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
            setTimeout(() => overlay.classList.toggle('opacity-0'), 10);
            document.body.classList.toggle('cart-open');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
            // Анимация кнопки или уведомление
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            localStorage.setItem('oblakocart', JSON.stringify(cart));
            const cartItems = document.getElementById('cartItems');
            const badge = document.getElementById('cartBadge');
            const total = document.getElementById('cartTotal');

            if (cart.length > 0) {
                badge.innerText = cart.length;
                badge.classList.remove('hidden');
                cartItems.innerHTML = cart.map((item, index) => `
                    <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl">${item.img}</span>
                            <div>
                                <p class="font-bold text-sm">${item.name}</p>
                                <p class="text-blue-600 font-bold">${item.price} ₽</p>
                            </div>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600 text-sm">Удалить</button>
                    </div>
                `).join('');
            } else {
                badge.classList.add('hidden');
                cartItems.innerHTML = `<p class="text-gray-400 text-center py-10">Корзина пока пуста</p>`;
            }

            const totalPrice = cart.reduce((sum, item) => sum + item.price, 0);
            total.innerText = `${totalPrice} ₽`;
        }

        // Запуск при загрузке
        renderProducts();
        updateCart();
    </script>
</body>
</html>
